name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install setuptools
        run: pip install --upgrade pip setuptools wheel
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.4.1
          virtualenvs-create: false
      - name: Install dependencies
        run: poetry install -C backend
      - name: Poetry check
        run: poetry check -C backend
      - name: Ruff
        run: |
          ruff check ./backend/hermes
          ruff format ./backend/hermes --check
      - name: Mypy
        run: mypy ./backend/hermes
      - name: Bandit
        run: bandit --skip B101 -r ./backend/hermes
      - name: Pytest
        run: pytest -v --cov=./backend/hermes --cov-report term-missing --cov-report xml:/tmp/coverage.xml --junitxml=/tmp/pytest.xml ./backend/tests
      - name: Pytest Coverage
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: /tmp/coverage.xml
          junitxml-path: /tmp/pytest.xml
