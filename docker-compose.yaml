version: "3.8"

x-env: &env
  TERM: "xterm-256color"

services:
  # ---- side ----
  backend:
    tty: true
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn hermes.app:app --host=0.0.0.0 --port 8000 --reload --http h11 --loop uvloop
    restart: unless-stopped
    environment:
      <<: *env
    volumes:
      - ./backend/hermes:/app/hermes
    ports:
      - "8000:8000"
